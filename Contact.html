<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoilIQ™ - Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body, html {
            height: 100%; /* Ensure body and html take up full height */
            line-height: 1.6;
            text-align: center;
            overflow-x: hidden;
        }

        /* Navbar */
        header {
            position: absolute;
            top: 20px; /* Added space from the top */
            left: 0;
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        header h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://www.proterrafoundation.org/wp-content/uploads/2022/10/soil-degradation-and-salinization.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh; /* Ensure it takes up the full screen */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
        }

        /* Contact Form */
        .contact-form {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: 30px auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .contact-form h3 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #333;
        }

        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #333;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .contact-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-form button:hover {
            background-color: #45a049;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <!-- Brand Name -->
        <h1>SoilIQ™</h1>

        <!-- Navigation Links -->
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="Aboutus.html">About Us</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h2>Get in Touch with SoilPh™</h2>
            <p>We'd love to hear from you! Fill out the contact form below to reach out.</p>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section>
        <div class="contact-form">
            <h3>Contact Us</h3>
            <form id="contactForm" action="submit_form.php" method="POST" onsubmit="return showNotification()">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>

                <label for="address">Address</label>
                <textarea id="address" name="address" rows="4" placeholder="Enter your address" required></textarea>

                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>

                <button type="submit">Submit</button>
            </form>
        </div>
    </section>

    <script>
        // Function to show notification when form is submitted
        function showNotification() {
            // Show success message
            alert('Thank you for reaching out! Your contact details have been submitted successfully.');

            // Clear the form fields
            document.getElementById('contactForm').reset();

            // Prevent form submission for now (remove if you want the form to actually submit)
            return false;  
        }
    </script>

</body>
</html>
